<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Butterfly Effect</title>
    <meta charset="utf-8" />
    <!-- Runs before first paint: sets data-theme from stored pref so preload matches app theme -->
    <script>
      (function () {
        try {
          var v = sessionStorage.getItem('be.darkMode');
          document.documentElement.setAttribute('data-theme', v === 'false' ? 'light' : 'dark');
        } catch (e) {}
      })();
    </script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />

    <!-- Description -->
    <meta
      name="description"
      content="Butterfly Effect is a playful project shaped by quick questions and shared responses."
    />

    <!-- Theme colors -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8f3ef" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#222227" />

    <!-- iOS PWA behavior -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/be-icon.svg" />
    <link rel="apple-touch-icon" href="/be-icon.svg" />

    <link rel="manifest" href="/manifest.json" />

    <!-- Preload fonts used in LCP text so they're fetched in parallel with the CSS -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/src/assets/fonts/roboto/KFO7CnqEu92Fr1ME7kSn66aGLdTylUAMa3yUBA.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/src/assets/fonts/libre-baskerville/kmKnZrc3Hgbbcjq75U4uslyuy4kn0qNZaxM.woff2" />

    <style>
      :root {
        color-scheme: light dark;
        --preload-bg-light: #f8f3ef;
        --preload-bg-dark: #222227;
      }

      html, body {
        height: 100%;
        margin: 0;
        background-color: var(--preload-bg-dark);
      }

      html[data-theme="light"], html[data-theme="light"] body {
        background-color: var(--preload-bg-light);
      }

      /* iOS safe-area coverage */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      .skip-link {
        position: absolute;
        top: -100%;
        left: 1rem;
        z-index: 10000;
        padding: 0.75rem 1.25rem;
        background: #000;
        color: #fff;
        font-family: sans-serif;
        font-size: 1rem;
        border-radius: 0 0 8px 8px;
        text-decoration: none;
        transition: top 0.1s;
      }
      .skip-link:focus {
        top: 0;
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: transparent;
        transition: opacity .25s ease;
      }

      #initial-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .be-loader {
        font-family: Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.06em;
        color: rgba(255, 255, 255, 0.82);
        animation: bePulse 1.6s ease-in-out infinite;
      }

      html[data-theme="light"] .be-loader { color: #2a2520; }

      @keyframes bePulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <noscript>Please enable JavaScript</noscript>

    <div id="initial-loader">
      <span class="be-loader">be</span>
    </div>

    <div id="butterfly-effect"></div>

    <script>
      (function () {
        function hideLoader() {
          const loader = document.getElementById('initial-loader');
          if (!loader || loader.classList.contains('is-hidden')) return;

          loader.classList.add('is-hidden');
          setTimeout(() => {
            loader.style.display = 'none';
          }, 300);
        }

        function observeMount() {
          const root = document.getElementById('butterfly-effect');
          if (!root) return;

          if (root.firstChild) {
            hideLoader();
            return;
          }

          const observer = new MutationObserver(() => {
            if (root.firstChild) {
              hideLoader();
              observer.disconnect();
            }
          });

          observer.observe(root, { childList: true, subtree: true });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', observeMount, { once: true });
        } else {
          observeMount();
        }

        window.addEventListener('load', hideLoader, { once: true });

        setTimeout(hideLoader, 4000);
      })();
    </script>

    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
