name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/config.toml"
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check save-user-response function
        run: deno check --config supabase/functions/save-user-response/deno.json supabase/functions/save-user-response/index.ts

      - name: Check deployment secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy save-user-response
        run: supabase functions deploy save-user-response --project-ref "$SUPABASE_PROJECT_REF"
