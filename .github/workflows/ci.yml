name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint cleaned modules
        run: npm run lint:ci

      - name: Test
        run: npm test -- --no-coverage

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build:all
        env:
          VITE_USE_MOCK_DATA: "true"

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$EC2_SSH_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes "${EC2_USER}@${EC2_HOST}" "cd ~/butterfly-effect && git fetch origin main && git reset --hard origin/main && cd app && npm install --include=dev && npm run build:all && pm2 restart all"
          rm -f /tmp/deploy_key
